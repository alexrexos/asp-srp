<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Create Shipment — Syria Atomy</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f5f7fa;color:#333;min-height:100vh}
.header{background:#fff;padding:16px 0;border-bottom:1px solid #e8ecf0}
.header-inner{max-width:900px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.header-left{display:flex;align-items:center;gap:12px}
.logo-img{height:40px}
.header-title{font-size:15px;font-weight:600}
.back-link{color:#00B6F0;text-decoration:none;font-size:13px;font-weight:500}
.back-link:hover{text-decoration:underline}
main{max-width:900px;margin:24px auto;padding:0 24px 60px}
h1{font-size:22px;font-weight:700;margin-bottom:20px}
.card{background:#fff;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,.04);padding:24px;margin-bottom:20px}
.card h2{font-size:13px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px}
label{display:block;font-size:12px;font-weight:600;color:#666;margin-bottom:6px}
input,select,textarea{font:inherit;font-family:'Inter',sans-serif;padding:10px 12px;border:1px solid #e2e8f0;border-radius:10px;width:100%;background:#fff;color:#333;font-size:13px}
input:focus,select:focus,textarea:focus{outline:none;border-color:#00B6F0;box-shadow:0 0 0 3px rgba(0,182,240,.12)}
textarea{min-height:60px;resize:vertical}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:14px}
button{font:inherit;font-family:'Inter',sans-serif;cursor:pointer;border:0;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600}
button.primary{background:#00B6F0;color:#fff}
button.primary:hover{background:#0099cc}
button.success{background:#16a34a;color:#fff}
button.success:hover{background:#15803d}
button.ghost{background:#f0f4f8;color:#555}
button.ghost:hover{background:#e2e8f0}
button.danger{background:#fee2e2;color:#b91c1c}
button.danger:hover{background:#fecaca}
.row-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}

.box-card{background:#fff;border-radius:14px;border:1px solid #e8ecf0;padding:18px;margin-bottom:14px}
.box-card.draft{border:2px dashed #00B6F0;background:#f0fbff}
.box-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.box-hdr .ttl{font-size:15px;font-weight:700}
.box-hdr .wt{font-size:12px;color:#888}

.item-row{display:grid;grid-template-columns:60px 1fr 110px 90px 30px;gap:10px;align-items:center;padding:8px 0;border-top:1px solid #f0f0f0}
.item-row:first-child{border-top:0}
.item-row .thumb{width:50px;height:50px;border-radius:8px;background:#f5f5f5;overflow:hidden;border:1px solid #eee}
.item-row .thumb img{width:100%;height:100%;object-fit:cover}
.item-row select{font-size:12px}
.item-row .x{background:#fee2e2;color:#b91c1c;border-radius:8px;padding:6px;font-size:14px;cursor:pointer;text-align:center;border:0;width:30px;height:30px}
.empty-items{text-align:center;color:#999;padding:14px;font-size:13px}

.added-card{background:#fff;border:1px solid #e8ecf0;border-radius:12px;padding:14px;margin-bottom:10px}
.added-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.added-hdr .ttl{font-size:14px;font-weight:700}
.added-hdr .wt{font-size:12px;color:#888}
.added-list{font-size:13px;color:#555}
.added-list .li{padding:4px 0;display:flex;justify-content:space-between}

.err{color:#dc2626;font-size:12px;margin-top:8px}
.ok{color:#0080a0;font-size:12px;margin-top:8px}

@media(max-width:640px){
.item-row{grid-template-columns:48px 1fr 70px 30px;}
.item-row .unit-cell{display:none}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-left">
      <a href="admin.html"><img class="logo-img" src="atomy-logo.png" alt="ATOMY"></a>
      <span class="header-title" id="hdrTitle">Create Shipment</span>
    </div>
    <a href="shipments.html" class="back-link">← All Shipments</a>
  </div>
</div>

<main>
  <h1 id="pageTitle">📦 Create New Shipment</h1>

  <div class="card">
    <h2>Shipment Info</h2>
    <div class="form-row">
      <div>
        <label>Destination</label>
        <input id="destination" placeholder="e.g. Damascus, Syria" />
      </div>
    </div>
    <label>Notes</label>
    <textarea id="notes" placeholder="Optional notes"></textarea>
  </div>

  <div class="card" id="boxes-list-card">
    <h2>Boxes <span id="boxCount" style="color:#00B6F0">(0)</span></h2>
    <div id="boxes-list"></div>
  </div>

  <div class="card box-card draft" id="add-box">
    <h2 style="color:#00B6F0">➕ Add a New Box</h2>
    <div class="form-row">
      <div>
        <label>Box Number</label>
        <input id="b_num" type="number" min="1" />
      </div>
      <div>
        <label>Weight (kg)</label>
        <input id="b_weight" type="number" step="0.1" min="0" placeholder="0.0" />
      </div>
    </div>

    <label style="margin-top:8px">Items in this box</label>
    <div id="items-list"></div>
    <div class="row-actions">
      <button class="ghost" id="btnAddItem" type="button">+ Add Item</button>
      <button class="success" id="btnSaveBox" type="button">💾 Save Box</button>
    </div>
    <div class="err" id="boxErr"></div>
  </div>

  <div class="row-actions" style="justify-content:flex-end">
    <a href="shipments.html"><button class="ghost" type="button">Cancel</button></a>
    <button class="primary" id="btnSaveShip" type="button">✅ Save Shipment</button>
  </div>
  <div class="err" id="globalErr"></div>
  <div class="ok" id="globalOk"></div>
</main>

<script>
(function(){
  const $=id=>document.getElementById(id);
  const params=new URLSearchParams(location.search);
  const editId=params.get('id')?Number(params.get('id')):null;
  const KEY='adminKey';
  const getKey=()=>sessionStorage.getItem(KEY);

  async function api(path, opts={}){
    const headers=Object.assign({'Content-Type':'application/json'}, opts.headers||{});
    const k=getKey();
    if(k) headers['X-Admin-Key']=k;
    const r=await fetch(path,{...opts,headers});
    if(r.status===401){ location.href='shipments.html'; throw new Error('unauth'); }
    const t=await r.text();
    const d=t?JSON.parse(t):null;
    if(!r.ok) throw new Error((d&&d.error)||r.statusText);
    return d;
  }

  function escapeHtml(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

  let products = [];
  let savedShipmentId = editId;
  let savedBoxes = []; // boxes already persisted
  let pendingBoxes = []; // boxes added before shipment created (only for new shipment flow)
  let currentItems = []; // items in the draft box being built

  const UNITS = ['pieces','sets','boxes','kg'];

  function productOption(selectedId){
    return [`<option value="">Select product...</option>`].concat(
      products.map(p=>`<option value="${p.id}" ${selectedId==p.id?'selected':''}>${escapeHtml(p.name_en)}</option>`)
    ).join('');
  }

  function unitOption(selected){
    return UNITS.map(u=>`<option value="${u}" ${u===selected?'selected':''}>${u}</option>`).join('');
  }

  function renderItemRow(idx){
    const it=currentItems[idx];
    const prod = products.find(p=>p.id==it.product_id);
    return `<div class="item-row" data-idx="${idx}">
      <div class="thumb">${prod&&prod.image_url?`<img src="${escapeHtml(prod.image_url)}" alt="">`:''}</div>
      <select class="i-prod">${productOption(it.product_id)}</select>
      <input class="i-qty" type="number" min="1" placeholder="Qty" value="${it.quantity||''}" />
      <select class="i-unit unit-cell">${unitOption(it.unit||'pieces')}</select>
      <button class="x" type="button" title="Remove">×</button>
    </div>`;
  }

  function renderItems(){
    if(!currentItems.length){
      $('items-list').innerHTML = `<div class="empty-items">No items yet. Click "Add Item" to start.</div>`;
      return;
    }
    $('items-list').innerHTML = currentItems.map((_,i)=>renderItemRow(i)).join('');
    document.querySelectorAll('#items-list .item-row').forEach(row=>{
      const idx=Number(row.dataset.idx);
      row.querySelector('.i-prod').onchange=e=>{
        currentItems[idx].product_id=Number(e.target.value)||null;
        renderItems();
      };
      row.querySelector('.i-qty').oninput=e=>{
        currentItems[idx].quantity=Number(e.target.value)||0;
      };
      row.querySelector('.i-unit').onchange=e=>{
        currentItems[idx].unit=e.target.value;
      };
      row.querySelector('.x').onclick=()=>{
        currentItems.splice(idx,1);
        renderItems();
      };
    });
  }

  function renderBoxes(){
    const all = [...savedBoxes, ...pendingBoxes];
    $('boxCount').textContent = `(${all.length})`;
    if(!all.length){
      $('boxes-list').innerHTML = `<div class="empty-items">No boxes added yet.</div>`;
      return;
    }
    $('boxes-list').innerHTML = all.map((b,i)=>{
      const items = b.items||[];
      return `<div class="added-card">
        <div class="added-hdr">
          <div class="ttl">📦 Box #${b.box_number} ${b._pending?'<span style="color:#f59e0b;font-size:11px">(unsaved)</span>':''}</div>
          <div class="wt">${(b.weight||0).toFixed(1)} kg · ${items.length} item${items.length===1?'':'s'}</div>
        </div>
        <div class="added-list">
          ${items.map(it=>{
            const p = products.find(p=>p.id==it.product_id);
            const name = (p?p.name_en:`Product #${it.product_id}`);
            return `<div class="li"><span>${escapeHtml(name)}</span><span><b>${it.quantity}</b> ${escapeHtml(it.unit||'pieces')}</span></div>`;
          }).join('')}
        </div>
        ${b._savedId?`<div class="row-actions" style="margin-top:10px"><button class="danger" type="button" data-del="${b.box_number}">Delete Box</button></div>`:''}
      </div>`;
    }).join('');
    document.querySelectorAll('#boxes-list button[data-del]').forEach(btn=>{
      btn.onclick=async()=>{
        const num=Number(btn.dataset.del);
        if(!confirm('Delete Box #'+num+'?')) return;
        await api(`/api/shipments/${savedShipmentId}/boxes/${num}`,{method:'DELETE'});
        await reloadShipment();
      };
    });
  }

  $('btnAddItem').onclick=()=>{
    currentItems.push({ product_id:null, quantity:1, unit:'pieces' });
    renderItems();
  };

  $('btnSaveBox').onclick=async()=>{
    $('boxErr').textContent='';
    const num=Number($('b_num').value);
    const weight=Number($('b_weight').value)||0;
    if(!Number.isInteger(num)||num<=0){ $('boxErr').textContent='Box number must be a positive integer'; return; }
    const items = currentItems.filter(it=>it.product_id&&it.quantity>0);
    if(!items.length){ $('boxErr').textContent='Add at least one item'; return; }
    const all = [...savedBoxes, ...pendingBoxes];
    if(all.some(b=>b.box_number===num)){ $('boxErr').textContent='Box #'+num+' already exists'; return; }

    if(savedShipmentId){
      try {
        await api(`/api/shipments/${savedShipmentId}/boxes`,{
          method:'POST',
          body:JSON.stringify({ box_number:num, weight, items })
        });
        await reloadShipment();
      } catch(e){ $('boxErr').textContent=e.message; return; }
    } else {
      pendingBoxes.push({ box_number:num, weight, items, _pending:true });
      renderBoxes();
    }
    // reset draft
    $('b_num').value='';
    $('b_weight').value='';
    currentItems=[];
    renderItems();
    nextBoxNum();
  };

  $('btnSaveShip').onclick=async()=>{
    $('globalErr').textContent='';
    $('globalOk').textContent='';
    const destination=$('destination').value.trim();
    const notes=$('notes').value.trim();
    try {
      if(savedShipmentId){
        await api(`/api/shipments/${savedShipmentId}`,{
          method:'PUT',
          body:JSON.stringify({ destination, notes })
        });
        $('globalOk').textContent='Saved!';
        setTimeout(()=>{ location.href=`shipment-detail.html?id=${savedShipmentId}`; },500);
      } else {
        const s = await api('/api/shipments',{
          method:'POST',
          body:JSON.stringify({ destination, notes })
        });
        savedShipmentId = s.id;
        // flush pending boxes
        for(const b of pendingBoxes){
          await api(`/api/shipments/${s.id}/boxes`,{
            method:'POST',
            body:JSON.stringify({ box_number:b.box_number, weight:b.weight, items:b.items })
          });
        }
        location.href = `shipment-detail.html?id=${s.id}`;
      }
    } catch(e){ $('globalErr').textContent=e.message; }
  };

  function nextBoxNum(){
    const all = [...savedBoxes, ...pendingBoxes];
    const max = all.reduce((m,b)=>Math.max(m,b.box_number||0),0);
    $('b_num').value = max+1;
  }

  async function reloadShipment(){
    if(!savedShipmentId) return;
    const s = await api('/api/shipments/'+savedShipmentId);
    $('destination').value = s.destination||'';
    $('notes').value = s.notes||'';
    savedBoxes = (s.boxes||[]).map(b=>({
      box_number:b.box_number,
      weight:b.weight,
      items:(b.items||[]).map(it=>({product_id:it.product_id,quantity:it.quantity,unit:it.unit})),
      _savedId:b.id
    }));
    renderBoxes();
    nextBoxNum();
  }

  async function init(){
    if(!getKey()){ location.href='shipments.html'; return; }
    try {
      products = await api('/api/products');
      if(editId){
        $('pageTitle').textContent='✏️ Edit Shipment';
        $('hdrTitle').textContent='Edit Shipment';
        await reloadShipment();
      } else {
        nextBoxNum();
        renderBoxes();
        renderItems();
      }
      // start with one empty item row to be helpful
      if(!currentItems.length){
        currentItems.push({ product_id:null, quantity:1, unit:'pieces' });
        renderItems();
      }
      if(location.hash==='#add-box'){
        document.getElementById('add-box').scrollIntoView({behavior:'smooth'});
      }
    } catch(e){ $('globalErr').textContent=e.message; }
  }
  init();
})();
</script>
</body>
</html>
