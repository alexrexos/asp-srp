            color: #00B6F0;
            font-weight: 600;
        }

function createCard(p, index) {
    const srpUSD = (p.priceTL * MULTIPLIER / RATE).toFixed(2);
    const descId = 'desc-' + index;
    const arrowId = 'arrow-' + index;
    const imgHtml = p.img
        ? `<img class="card-img" src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.style.background='#eef3f7';this.alt='Image unavailable'">`
        : `<div class="card-img" style="display:flex;align-items:center;justify-content:center;font-size:48px;background:#fafbfc;">🧴</div>`;
    return `
        <div class="card">
            ${imgHtml}
            <div class="card-body">
                <div class="card-name">${p.name}</div>
                <div class="card-ar">${p.arabic || ''}</div>
                <div class="card-kr">${p.korean || ''}</div>
                <div class="card-price">$${parseFloat(srpUSD).toLocaleString('en-US', {minimumFractionDigits:2})}</div>
                <div class="desc-toggle" onclick="toggleDesc('${descId}','${arrowId}')">
                    <span class="desc-toggle-label">📖 الوصف وطريقة الاستخدام</span>
                    <span class="desc-arrow" id="${arrowId}">▼</span>
                </div>
                <div class="desc-content" id="${descId}">
                    <div class="desc-inner">${p.desc}</div>
                </div>
            </div>
        </div>
    `;
}

function toggleDesc(id, arrowId) {
    const el = document.getElementById(id);
    const arrow = document.getElementById(arrowId);
    el.classList.toggle('open');
    arrow.classList.toggle('open');
}

const categories = ['skincare', 'suncare', 'masks', 'haircare', 'bodycare', 'oralcare', 'household'];
let idx = 0;
categories.forEach(cat => {
    const container = document.getElementById(cat);
    if (!container) return;
    const catProducts = products.filter(p => p.category === cat);
    container.innerHTML = catProducts.map(p => createCard(p, idx++)).join('');
});
