<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atomy Syria Project — SRP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f7fa;
            color: #333;
            min-height: 100vh;
        }
        .header {
            background: #ffffff;
            color: #333;
            padding: 16px 0;
            border-bottom: 1px solid #e8ecf0;
        }
        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-img { height: 50px; }
        .section-title {
            max-width: 1200px;
            margin: 40px auto 16px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .section-title h2 { font-size: 18px; font-weight: 600; color: #333; }
        .section-title .badge {
            background: #00B6F0;
            color: white;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 500;
        }
        .grid {
            max-width: 1200px;
            margin: 0 auto 32px;
            padding: 0 24px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        .card-img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: contain;
            background: #fafbfc;
            padding: 20px;
        }
        .card-body { padding: 16px 20px 20px; }
        .card-name {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 2px;
            line-height: 1.3;
        }
        .card-ar {
            font-size: 13px;
            font-weight: 500;
            color: #555;
            direction: rtl;
            margin-bottom: 2px;
            line-height: 1.3;
        }
        .card-kr {
            font-size: 12px;
            color: #999;
            margin-bottom: 12px;
        }
        .card-price {
            font-size: 22px;
            font-weight: 700;
            color: #00B6F0;
            margin-bottom: 8px;
        }
        .qty-badge {
            display: inline-block;
            background: #f0f4f8;
            color: #666;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 8px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        /* Collapsible description */
        .desc-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            padding: 8px 0 0;
            border-top: 1px solid #f0f0f0;
            margin-top: 4px;
            user-select: none;
        }
        .desc-toggle-label {
            font-size: 12px;
            color: #00B6F0;
            font-weight: 600;
        }
        .desc-arrow {
            font-size: 10px;
            color: #00B6F0;
            transition: transform 0.2s;
        }
        .desc-arrow.open { transform: rotate(180deg); }
        .desc-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .desc-content.open { max-height: 600px; }
        .desc-inner {
            padding: 10px 0 0;
            font-size: 12px;
            color: #666;
            line-height: 1.7;
            direction: rtl;
            text-align: right;
        }
        .desc-inner h4 {
            font-size: 13px;
            color: #333;
            margin-bottom: 6px;
            direction: rtl;
            text-align: right;
        }
        .desc-inner strong { color: #444; }
        .desc-inner ol, .desc-inner ul {
            padding-right: 16px;
            margin: 6px 0;
        }
        .desc-inner li { margin-bottom: 3px; }
        .desc-inner .tip {
            margin-top: 8px;
            padding: 6px 10px;
            background: #f0f8ff;
            border-radius: 6px;
            color: #0080a0;
            font-size: 11px;
            direction: rtl;
            text-align: right;
        }
        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
        }
    </style>
</head>

function createCard(p, index) {
    const srpUSD = (p.priceTL * MULTIPLIER / RATE).toFixed(2);
    const descId = 'desc-' + index;
    const arrowId = 'arrow-' + index;
    const imgHtml = p.img
        ? `<img class="card-img" src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.style.background='#eef3f7';this.alt='Image unavailable'">`
        : `<div class="card-img" style="display:flex;align-items:center;justify-content:center;font-size:48px;background:#fafbfc;">🧴</div>`;
    return `
        <div class="card">
            ${imgHtml}
            <div class="card-body">
                <div class="card-name">${p.name}</div>
                <div class="card-ar">${p.arabic || ''}</div>
                <div class="card-kr">${p.korean || ''}</div>
                <div class="card-price">$${parseFloat(srpUSD).toLocaleString('en-US', {minimumFractionDigits:2})}</div>
                <div class="desc-toggle" onclick="toggleDesc('${descId}','${arrowId}')">
                    <span class="desc-toggle-label">📖 الوصف وطريقة الاستخدام</span>
                    <span class="desc-arrow" id="${arrowId}">▼</span>
                </div>
                <div class="desc-content" id="${descId}">
                    <div class="desc-inner">${p.desc}</div>
                </div>
            </div>
        </div>
    `;
}

function toggleDesc(id, arrowId) {
    const el = document.getElementById(id);
    const arrow = document.getElementById(arrowId);
    el.classList.toggle('open');
    arrow.classList.toggle('open');
}

const categories = ['skincare', 'suncare', 'masks', 'haircare', 'bodycare', 'oralcare', 'household'];
let idx = 0;
categories.forEach(cat => {
    const container = document.getElementById(cat);
    if (!container) return;
    const catProducts = products.filter(p => p.category === cat);
    container.innerHTML = catProducts.map(p => createCard(p, idx++)).join('');
});
